<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verification</title>
  <link rel="stylesheet" href="/static/verify.css" />
  <script src="https://openfpcdn.io/fingerprintjs/v4/iife.min.js" defer></script>
</head>
<body>
  <main class="card" id="app">
    <div id="loading" class="state">
      <div class="spinner"></div>
      <p>Checking your link…</p>
    </div>

    <div id="blocked" class="state hidden">
      <h1>Account restricted</h1>
    </div>

    <div id="pending" class="state hidden">
      <h1>Verification under review</h1>
      <p>Once completed, you will receive a notification in Telegram DMs.</p>
    </div>

    <div id="form" class="state hidden">
      <h1>Complete verification</h1>
      <p class="subtitle">Type the sentence below to continue.</p>

      <blockquote id="sentence" class="sentence"></blockquote>

      <textarea
        id="typed"
        rows="4"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        placeholder="Type here…"
      ></textarea>
      <p id="match-hint" class="hint"></p>

      <label class="checkbox">
        <input type="checkbox" id="privacy" />
        <span>I agree to the <a href="#" id="privacy-link">privacy policy</a>.</span>
      </label>

      <button id="submit" type="button" disabled>Continue</button>
    </div>

    <div id="success" class="state hidden">
      <h1>You're all set</h1>
      <p>Check Telegram for next steps.</p>
    </div>

    <div id="error" class="state hidden">
      <h1>Account restricted</h1>
      <p id="error-text">This link is no longer valid.</p>
    </div>
  </main>

  <script src="/static/verify.js" type="module"></script>
</body>
</html>
